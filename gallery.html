<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bobo Cakes | Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="container">
        <a class="brand" href="index.html">
          <img src="assets/images/logo.png" alt="Bobo Cakes logo" />
          <span>Bobo</span> Cakes
        </a>
        <button class="mobile-menu" id="mobileMenuToggle">Menu</button>
        <nav class="site-nav" id="siteNav">
          <a href="index.html">Home</a>
          <a href="menu.html">Menu</a>
          <a href="gallery.html">Gallery</a>
          <a href="about.html">About</a>
          <a href="faq.html">FAQ</a>
        </nav>
      </div>
    </div>
  </header>
  <main class="section container">
    <div class="section-heading">
      <span>Gallery</span>
      <h2>Our cakes and events</h2>
    </div>
    <div class="gallery-grid">
      <div class="gallery-item"><img src="assets/images/chocolate-swirl.jpg" alt="Chocolate Swirl cake" /></div>
      <div class="gallery-item"><img src="assets/images/red-velvet.png" alt="Red Velvet cake" /></div>
      <div class="gallery-item"><img src="assets/images/pink-swan.jpg" alt="Pink Swan cake" /></div>
      <div class="gallery-item"><img src="assets/images/blueberry-muffin.jpg" alt="Blueberry Muffin" /></div>
      <div class="gallery-item"><img src="assets/images/caramel-cupcake.jpg" alt="Caramel Cupcake" /></div>
      <div class="gallery-item"><img src="assets/images/blackforest-cake.JPG" alt="Blackforest cake" /></div>
    </div>
  </main>
  <div class="footer-wave-divider">
    <svg viewBox="0 0 1200 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="footerWaveGradient" x1="0%" x2="0%" y1="0%" y2="100%">
          <stop offset="0%" stop-color="#571176" />
          <stop offset="100%" stop-color="#8f2ab0" />
        </linearGradient>
      </defs>
      <path d="M0,30 C240,110 480,-20 720,30 C960,80 1200,10 1200,30 L1200,120 L0,120 Z" fill="url(#footerWaveGradient)" />
    </svg>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; 2026 Bobo Cakes. Made with love for Eldoret families.</p>
      <p>Business hours: Mon-Fri 8:00–18:00, Sat-Sun 9:00–12:00</p>
    </div>
  </footer>
  <script src="assets/js/main.js"></script>
</body>
</html>
